<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 核心：移动端视口适配（必须保留） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星迈寰宇供应链 XingMai Global</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background: #f5f0e8;
  color: #111;
  line-height: 1.6;
  /* 移动端文字优化 */
  -webkit-text-size-adjust: 100%;
}

/* 移动端通用间距 */
section {
  padding: 40px 16px;
  max-width: 100%;
  width: 100%;
  margin: 0 auto;
}

h1 {
  font-size: 24px;
  margin-bottom: 12px;
  line-height: 1.3;
}

h2 {
  font-size: 20px;
  margin-bottom: 12px;
}

h3 {
  font-size: 18px;
  margin-top: 15px;
}

p {
  margin-bottom: 10px;
  font-size: 15px;
}

ul {
  padding-left: 20px;
  margin: 10px 0;
}

li {
  margin-bottom: 6px;
  font-size: 15px;
}

/* 移动端按钮优化 */
.btn {
  background: #d63a2f;
  color: #fff;
  padding: 14px 20px;
  text-decoration: none;
  display: inline-block;
  border-radius: 6px;
  text-align: center;
  font-size: 16px;
  width: 100%;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

/* 数据统计移动端自适应网格 */
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  background: #111;
  color: #fff;
  text-align: center;
}

.stat {
  padding: 25px 10px;
  border-bottom: 1px solid #333;
}

/* 去掉最后一行边框 */
.stat:nth-last-child(1),.stat:nth-last-child(2){
  border-bottom: none;
}

.stat-num {
  font-size: 24px;
  color: #c8952a;
  font-weight: bold;
  margin-bottom: 4px;
}

/* 报价表单区域 */
.quote {
  background: #111;
  color: #fff;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  background: #fff;
  color: #111;
}

/* 滑块样式优化 */
input[type="range"] {
  height: 40px;
  padding: 0;
  background: transparent;
}

/* WhatsApp按钮 */
#wa {
  background: #25D366 !important;
  display: none;
}

/* 联系信息 */
.contact p {
  margin: 6px 0;
  word-break: break-all;
}
</style>
</head>

<body>

<!-- HERO -->
<section>
  <h1>跨境物流 + 全球代采</h1>
  <p>服务覆盖80+国家，年处理订单超35,000单，帮助全球卖家高效对接中国供应链。</p>
  <a href="#quote" class="btn">获取报价</a>
</section>

<!-- STATS 移动端2列布局 -->
<div class="stats">
  <div class="stat"><div class="stat-num">80+</div>国家</div>
  <div class="stat"><div class="stat-num">35,000+</div>订单</div>
  <div class="stat"><div class="stat-num">99.6%</div>准时率</div>
  <div class="stat"><div class="stat-num">3年+</div>经验</div>
</div>

<!-- SERVICES -->
<section>
  <h2>核心服务</h2>
  <ul>
    <li>国际物流（空运 / 海运 / 电商专线）</li>
    <li>中国代采（1688 / 工厂 / OEM）</li>
    <li>验货质检</li>
    <li>仓储集货</li>
  </ul>
</section>

<!-- QUOTE CALCULATOR -->
<section class="quote" id="quote">
  <h2>获取运费报价</h2>

  <select id="country">
    <option value="usa">美国</option>
    <option value="uk">英国</option>
    <option value="uae">阿联酋</option>
    <option value="au">澳大利亚</option>
    <option value="de">德国</option>
  </select>

  <input type="range" id="weight" min="1" max="100" value="10" oninput="w.innerText=this.value">
  <p>重量：<span id="w">10</span> kg</p>

  <select id="type">
    <option value="air">空运</option>
    <option value="sea">海运</option>
  </select>

  <button onclick="calc()" class="btn">计算报价</button>
  <h3 id="price"></h3>

  <a id="wa" target="_blank" class="btn">
    WhatsApp 获取精准报价
  </a>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>联系我们</h2>
  <p>WhatsApp: +86 19842722052</p>
  <p>Email: support@scmxing.com</p>
  <p>地址：深圳市龙华区明治街道大为商务时空B座303室</p>
</section>

<script>
function calc(){
  let w = document.getElementById('weight').value
  let c = document.getElementById('country').value
  let t = document.getElementById('type').value

  let air = {usa:45,uk:42,uae:38,au:40,de:43}
  let sea = {usa:12,uk:11,uae:10,au:11,de:12}

  let p = t==='air' ? w*air[c] : w*sea[c]
  p = Math.round(p)

  document.getElementById('price').innerText = "预估价格：￥" + p

  let msg = `Quote request: ${c}, ${w}kg, ${t}`
  document.getElementById('wa').href = "https://wa.me/8619842722052?text=" + encodeURIComponent(msg)
  document.getElementById('wa').style.display = "inline-block"
}
</script>

</body>
</html>
